    function buildServices() { const s=t().services; setText('servicesKicker',s.kicker); setText('servicesTitle',s.title); setText('servicesDesc',s.desc); qs('#servicesGrid').innerHTML=s.items.map(([n,title,desc,list])=>`<article class="service reveal"><code>${n}</code><h3>${title}</h3><p>${desc}</p><ul>${list.map(i=>`<li>${i}</li>`).join('')}</ul></article>`).join(''); }
    function buildWork() { const w=t().work; setText('workKicker',w.kicker); setText('workTitle',w.title); setText('workDesc',w.desc); qs('#workGrid').innerHTML=w.items.map(([title,desc,tags,btn,url])=>`<article class="work-card reveal"><div class="work-visual"><div class="browser"></div></div><h3>${title}</h3><p>${desc}</p><div class="tags">${tags.map(tag=>`<span>${tag}</span>`).join('')}</div><a class="btn light" style="margin-top:18px;width:max-content" href="${url}" ${url.startsWith('http')?'target="_blank" rel="noopener"':''}>${btn}</a></article>`).join(''); }
    function buildBudget() { const b=t().budget; setText('budgetKicker',b.kicker); setText('budgetTitle',b.title); setText('budgetDesc',b.desc); qs('#budgetGrid').innerHTML=b.items.map(([title,price,desc])=>`<article class="budget-card reveal"><h3>${title}</h3><div class="budget-price">${price}</div><p>${desc}</p></article>`).join(''); }
    function buildProcess() { const p=t().process; setText('processKicker',p.kicker); setText('processTitle',p.title); qs('#processList').innerHTML=p.items.map(([n,title,desc])=>`<article class="step reveal"><div class="step-num">${n}</div><div><h3>${title}</h3><p>${desc}</p></div></article>`).join(''); }
    function buildContact() { const x=t(); setText('contactKicker',x.contact.kicker); setText('contactTitle',x.contact.title); setText('contactDesc',x.contact.desc); setText('labelName',x.form.name); setText('labelEmail',x.form.email); setText('labelProject',x.form.project); setText('labelBudget',x.form.budget); setText('budgetHelp',x.form.budgetHelp); setText('labelMessage',x.form.message); setText('submitBtn',x.form.submit); setText('formStatus',x.form.status); qs('#name').placeholder=x.form.placeholders.name; qs('#email').placeholder=x.form.placeholders.email; qs('#budgetInput').placeholder=x.form.placeholders.budget; qs('#message').placeholder=x.form.placeholders.message; qs('#project').innerHTML=x.form.options.map(o=>`<option value="${o}">${o}</option>`).join(''); setText('footerDesc',x.footer); }
    function reveal() { const io=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible'); io.unobserve(e.target);}}),{threshold:.12}); qsa('.reveal:not(.visible)').forEach((el,i)=>{el.style.transitionDelay=`${(i%6)*45}ms`; io.observe(el);}); }
    function startRotator() { if(rotatorTimer) clearInterval(rotatorTimer); rotatorTimer=setInterval(()=>{ const el=qs('#rotatingWord'); const words=t().hero.rotating; if(!el) return; el.classList.add('out'); setTimeout(()=>{rotatorIndex=(rotatorIndex+1)%words.length; el.textContent=words[rotatorIndex]; el.classList.remove('out');},280); },4300); }
    function activeNav() { const pos=window.scrollY+180; let active='home'; navOrder.forEach(id=>{const el=id==='home'?document.body:qs('#'+id); if(el && el.offsetTop<=pos) active=id;}); qsa('.nav-link').forEach(l=>l.classList.toggle('active',l.dataset.target===active)); }
    function apply() { document.documentElement.lang=currentLang; document.documentElement.dir='ltr'; buildNav(); buildHero(); buildMarquee(); buildResults(); buildServices(); buildWork(); buildBudget(); buildProcess(); buildContact(); startRotator(); setTimeout(reveal,20); activeNav(); }
    document.addEventListener('DOMContentLoaded',()=>{ apply(); qs('#mobileToggle').addEventListener('click',()=>{const open=qs('#mobileMenu').classList.toggle('open'); qs('#mobileToggle').classList.toggle('open',open); qs('#mobileToggle').setAttribute('aria-expanded',String(open));}); window.addEventListener('scroll',activeNav,{passive:true}); qs('#contactForm').addEventListener('submit',e=>{ e.preventDefault(); const f=t().form; const name=qs('#name').value.trim(); const email=qs('#email').value.trim(); const project=qs('#project').value; const budget=Number(qs('#budgetInput').value); const message=qs('#message').value.trim(); if(!budget || budget<80){setText('formStatus',f.error); qs('#budgetInput').focus(); return;} const lines=currentLang==='ar'?['السلام عليكم Reda Web، أبغا أبدأ مشروع موقع.',`الاسم: ${name}`,`الإيميل: ${email}`,`نوع المشروع: ${project}`,`الميزانية: ${budget} دولار`,`التفاصيل: ${message}`]:currentLang==='fr'?['Bonjour Reda Web, je veux démarrer un projet web.',`Nom: ${name}`,`Email: ${email}`,`Type de projet: ${project}`,`Budget: ${budget} USD`,`Message: ${message}`]:['Hi Reda Web, I want to start a website project.',`Name: ${name}`,`Email: ${email}`,`Project type: ${project}`,`Budget: ${budget} USD`,`Message: ${message}`]; setText('formStatus',f.success); window.open('https://wa.me/212635761086?text='+encodeURIComponent(lines.join(String.fromCharCode(10))),'_blank','noopener'); }); });
  </script>
</body>
</html>
